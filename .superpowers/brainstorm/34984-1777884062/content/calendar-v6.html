<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排期日历 v6</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: #e8e4dc;
  padding: 28px 16px 80px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}

:root {
  --bg:     #f4f2ed;
  --card:   #ffffff;
  --green2: #2a4a3a;
  --border: #e2ddd5;
  --t1:     #2d2926;
  --t2:     #6b6560;
  --t3:     #9a8e85;
  --today:  #ff3b30;

  --r0: #3c6652;
  --r1: #c9a87c;
  --r2: #7aab94;
  --r3: #2a4a3a;

  --row-h:  26px;
  --date-w: 34px;
  --col-w:  34px;   /* 34 + 4×34 = 170px total */
  --bk-pad: 2px;
}

.phone {
  width: 170px;
  border-radius: 28px; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.16);
  background: var(--bg);
}
.ph-statusbar {
  height: 24px; background: var(--bg);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px; font-size: 10px; font-weight: 600; color: var(--t2);
}
.ph-header {
  background: var(--bg); padding: 6px 14px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-end; justify-content: space-between;
}
.ph-logo-main { font-size: 15px; font-weight: 800; color: var(--green2); letter-spacing: 3px; }
.ph-logo-sub  { font-size: 7px; letter-spacing: 2px; color: var(--t3); text-transform: uppercase; margin-top: 1px; }
.ph-sync { display:flex; align-items:center; gap:3px; font-size:8px; color:var(--r0); }
.ph-sync-dot { width:4px; height:4px; border-radius:50%; background:var(--r0); }

.month-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px 5px; background: var(--bg);
}
.month-nav-arrow {
  width: 20px; height: 20px; border-radius: 6px;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--t2);
}

/* ── Column header ──
   Layout per room cell:
     [room name text]     ← 6px, centered
     [▬▬ color bar ▬▬]  ← 3px tall, full width, room color
*/
.col-header { display: flex; background: var(--card); border-bottom: 2px solid #e2ede7; }
.col-header-date {
  width: var(--date-w); flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 5px 0 3px;
  font-size: 7px; color: var(--t3); text-align: center; font-weight: 600;
}
.col-header-room {
  width: var(--col-w); flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 5px 2px 0;
  gap: 3px;
}
.col-header-room:last-child { border-right: none; }
.room-name {
  font-size: 6.5px; font-weight: 700; color: var(--t1);
  white-space: nowrap; text-align: center; line-height: 1;
}
/* color bar sits flush at the bottom of the header cell */
.room-bar {
  width: 100%; height: 3px; border-radius: 0;
  margin-top: 2px;
}

/* ── Grid ── */
.gantt-scroll { overflow-y: auto; max-height: 300px; background: var(--bg); }
.gantt-grid   { position: relative; width: 170px; }

.grid-row { display: flex; height: var(--row-h); }
.grid-row.today-row { border-bottom: 2.5px solid var(--today); }

.grid-date {
  width: var(--date-w); flex-shrink: 0;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; color: var(--t2); font-weight: 500;
  background: var(--bg); position: relative; z-index: 3;
}
.grid-row.today-row .grid-date {
  font-weight: 800; color: var(--today);
  border-bottom: 2.5px solid var(--today);
}
.today-dot {
  display: inline-block; width: 4px; height: 4px; border-radius: 50%;
  background: var(--today); margin-right: 2px; vertical-align: middle; margin-bottom: 1px;
}
.grid-cell {
  width: var(--col-w); flex-shrink: 0;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--card);
}
.grid-row.today-row .grid-cell { border-bottom: 2.5px solid var(--today); }
.grid-cell:last-child { border-right: none; }

/* ── Booking blocks ── */
.bk {
  position: absolute;
  width: calc(var(--col-w) - var(--bk-pad)*2);
  border-radius: 5px;
  display: flex; align-items: flex-start;
  padding: 3px 3px;
  font-size: 6px; font-weight: 700; color: rgba(255,255,255,0.95);
  overflow: hidden; z-index: 2; line-height: 1.2;
}
.col-0 { left: calc(var(--date-w) + 0*var(--col-w) + var(--bk-pad)); }
.col-1 { left: calc(var(--date-w) + 1*var(--col-w) + var(--bk-pad)); }
.col-2 { left: calc(var(--date-w) + 2*var(--col-w) + var(--bk-pad)); }
.col-3 { left: calc(var(--date-w) + 3*var(--col-w) + var(--bk-pad)); }

.r0 { background: var(--r0); }
.r1 { background: var(--r1); }
.r2 { background: var(--r2); color: rgba(42,74,58,0.9); }
.r3 { background: var(--r3); }

/* Tabbar */
.ph-tabbar { background: var(--card); border-top: 1px solid var(--border); display: flex; padding: 6px 0 10px; }
.ph-tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; }
.ph-tab svg { width:13px; height:13px; }
.ph-tab-lbl { font-size:7px; font-weight:500; }
.ph-tab-active svg { stroke: var(--r0); }
.ph-tab-active .ph-tab-lbl { color: var(--r0); font-weight:700; }
.ph-tab-inactive svg { stroke: var(--t3); }
.ph-tab-inactive .ph-tab-lbl { color: var(--t3); }

.legend {
  display: flex; gap: 6px; padding: 6px 10px; background: var(--bg);
  border-top: 1px solid var(--border); flex-wrap: wrap;
}
.legend-item { display:flex; align-items:center; gap:3px; font-size:7px; color:var(--t2); }
.legend-swatch { width:10px; height:3px; border-radius:2px; }
.legend-line   { width:12px; height:2px; background:var(--today); border-radius:1px; }
</style>
</head>
